<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Dashboard{% endblock %} — Estalatree</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/htmx.org@1.9.12" defer></script>
</head>
<body class="bg-gray-50 text-gray-900 min-h-screen">

  <!-- Nav -->
  <nav class="bg-white border-b border-gray-200">
    <div class="max-w-5xl mx-auto px-4 h-14 flex items-center justify-between">
      <a href="{% url 'dashboard:home' %}" class="font-semibold text-indigo-600">Estalatree</a>
      <div class="flex items-center gap-4 text-sm">
        <a href="{% url 'dashboard:wallet' %}" class="text-gray-600 hover:text-indigo-600">Wallet</a>
        <a href="{% url 'dashboard:products' %}" class="text-gray-600 hover:text-indigo-600">Products</a>
        <a href="{% url 'dashboard:subscriptions' %}" class="text-gray-600 hover:text-indigo-600">Subscriptions</a>
        <a href="{% url 'dashboard:invoices' %}" class="text-gray-600 hover:text-indigo-600">Invoices</a>
        <a href="{% url 'dashboard:profile' %}" class="text-gray-600 hover:text-indigo-600">Profile</a>
        <a href="{% url 'dashboard:support' %}" class="text-gray-600 hover:text-indigo-600">Support</a>
        <a href="{% url 'account_logout' %}" class="text-gray-400 hover:text-red-500 ml-2">Sign out</a>
      </div>
    </div>
  </nav>

  <main class="max-w-5xl mx-auto px-4 py-8">
    {% if messages %}
      <div class="mb-4 space-y-2">
        {% for msg in messages %}
          <div class="px-4 py-3 rounded text-sm
            {% if msg.tags == 'error' %}bg-red-50 text-red-800 border border-red-200
            {% elif msg.tags == 'success' %}bg-green-50 text-green-800 border border-green-200
            {% else %}bg-blue-50 text-blue-800 border border-blue-200{% endif %}">
            {{ msg }}
          </div>
        {% endfor %}
      </div>
    {% endif %}

    {% block content %}{% endblock %}
  </main>

</body>
</html>
