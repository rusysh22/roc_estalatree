<div class="bg-amber-50 border border-amber-200 rounded-lg p-3 space-y-2">
  <p class="text-xs font-medium text-amber-800">Secret revealed — copy and store it safely. This is shown only once.</p>
  <div class="bg-white border border-amber-300 rounded flex items-center gap-2 px-3 py-2">
    <code class="flex-1 font-mono text-sm break-all text-gray-800" id="secret-{{ grant.pk }}">{{ plaintext }}</code>
    <button
      onclick="navigator.clipboard.writeText(document.getElementById('secret-{{ grant.pk }}').textContent.trim()).then(() => this.textContent='Copied!').catch(() => {})"
      class="text-xs text-amber-700 hover:text-amber-900 font-medium shrink-0 transition-all">
      Copy
    </button>
  </div>
</div>
