{% extends "dashboard/base.html" %}
{% block title %}Profile{% endblock %}

{% block content %}
<h1 class="text-2xl font-bold mb-6">Profile & Settings</h1>

<div class="bg-white rounded-lg border border-gray-200 p-6 max-w-lg">
  <form method="post" action="{% url 'dashboard:profile' %}">
    {% csrf_token %}

    <div class="mb-4">
      <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
      <input type="text" value="{{ customer.user.email }}" disabled
             class="w-full px-3 py-2 border border-gray-200 rounded bg-gray-50 text-gray-500 text-sm">
      <p class="text-xs text-gray-400 mt-1">
        Managed via Google SSO — <a href="{% url 'account_email' %}" class="underline">change email</a>
      </p>
    </div>

    <div class="mb-6">
      <label for="wa_number" class="block text-sm font-medium text-gray-700 mb-1">WhatsApp Number</label>
      <input
        type="tel"
        id="wa_number"
        name="wa_number"
        value="{{ customer.wa_number }}"
        placeholder="08123456789"
        class="w-full px-3 py-2 border border-gray-300 rounded text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500">
      <p class="text-xs text-gray-400 mt-1">Used for renewal reminders and order notifications.</p>
    </div>

    <button type="submit"
            class="bg-indigo-600 hover:bg-indigo-700 text-white font-medium px-5 py-2 rounded text-sm">
      Save
    </button>
  </form>
</div>
{% endblock %}
