<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Store{% endblock %} — Estalatree</title>
  {% load static %}
  <link rel="stylesheet" href="{% static 'css/main.css' %}">
</head>
<body class="bg-gray-50 text-gray-900 min-h-screen">

  <nav class="bg-white border-b border-gray-100">
    <div class="max-w-3xl mx-auto px-4 h-14 flex items-center justify-between">
      <a href="/" class="font-semibold text-indigo-600">Estalatree</a>
      <div class="flex items-center gap-3 text-sm">
        {% if user.is_authenticated %}
          <a href="{% url 'dashboard:wallet' %}" class="text-gray-500 hover:text-indigo-600">
            Balance
          </a>
          <a href="{% url 'dashboard:home' %}" class="text-gray-600 hover:text-indigo-600">Dashboard</a>
        {% else %}
          <a href="{% url 'account_login' %}" class="text-gray-600 hover:text-indigo-600">Sign in</a>
          <a href="{% url 'storefront:topup' %}"
             class="bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-medium px-4 py-1.5 rounded-lg">
            Top up
          </a>
        {% endif %}
      </div>
    </div>
  </nav>

  <main class="max-w-3xl mx-auto px-4 py-10">
    {% if messages %}
      <div class="mb-6 space-y-2">
        {% for msg in messages %}
          <div class="px-4 py-3 rounded text-sm
            {% if msg.tags == 'error' %}bg-red-50 text-red-800 border border-red-200
            {% elif msg.tags == 'success' %}bg-green-50 text-green-800 border border-green-200
            {% else %}bg-blue-50 text-blue-800 border border-blue-200{% endif %}">
            {{ msg }}
          </div>
        {% endfor %}
      </div>
    {% endif %}

    {% block content %}{% endblock %}
  </main>

</body>
</html>
