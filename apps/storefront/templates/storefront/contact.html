{% extends "storefront/base.html" %}
{% block page_title %}Contact — {{ product.name }}{% endblock %}

{% block content %}
<div class="mb-6">
  <a href="/" class="text-sm text-indigo-500 hover:underline">&larr; Back to store</a>
</div>

<div class="max-w-md mx-auto">
  <h1 class="text-2xl font-bold mb-1">{{ product.name }}</h1>
  <p class="text-gray-500 text-sm mb-6">Fill in your details and we'll reach out via WhatsApp.</p>

  <div class="bg-white rounded-xl border border-gray-200 p-6">
    <form method="post">
      {% csrf_token %}

      <div class="mb-4">
        <label for="name" class="block text-sm font-medium text-gray-700 mb-1">Your name</label>
        <input type="text" id="name" name="name" required placeholder="Full name"
               class="w-full px-3 py-2.5 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500">
      </div>

      <div class="mb-5">
        <label for="contact" class="block text-sm font-medium text-gray-700 mb-1">
          WhatsApp / Email
        </label>
        <input type="text" id="contact" name="contact" required placeholder="081234567890 or email@example.com"
               class="w-full px-3 py-2.5 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500">
      </div>

      <button type="submit"
              class="w-full bg-green-500 hover:bg-green-600 text-white font-semibold py-3 rounded-xl">
        Send inquiry
      </button>
    </form>
  </div>
</div>
{% endblock %}
