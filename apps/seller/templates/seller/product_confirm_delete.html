{% extends "seller/base.html" %}
{% block page_title %}Archive Product{% endblock %}

{% block content %}
<div class="max-w-md">
  <div class="bg-white rounded-xl border border-gray-200 p-6">
    <div class="w-10 h-10 bg-red-50 rounded-xl flex items-center justify-center mb-4">
      <svg class="w-5 h-5 text-red-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/></svg>
    </div>
    <h2 class="font-semibold text-gray-800 mb-2">Archive "{{ product.name }}"?</h2>
    <p class="text-sm text-gray-500 mb-5">
      This will set the product to <strong>Draft</strong>, hiding it from your store.
      Existing subscriptions and orders are not affected.
    </p>
    <div class="flex gap-3">
      <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn-danger">Yes, Archive</button>
      </form>
      <a href="{% url 'seller:products' %}" class="btn-secondary">Cancel</a>
    </div>
  </div>
</div>
{% endblock %}
