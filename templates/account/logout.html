{% extends "account/base_entrance.html" %}
{% load i18n %}
{% block head_title %}{% trans "Sign Out" %}{% endblock %}

{% block content %}
<div class="text-center mb-6">
  <h1 class="text-2xl font-bold text-gray-900">Sign out</h1>
  <p class="text-sm text-gray-500 mt-2">Are you sure you want to sign out?</p>
</div>

<form method="post" action="{% url 'account_logout' %}">
  {% csrf_token %}
  <button type="submit"
    class="w-full bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-semibold py-2.5 rounded-lg transition-colors mb-3">
    Sign Out
  </button>
</form>

<a href="/" class="block text-center text-sm text-gray-400 hover:text-gray-600">
  Cancel
</a>
{% endblock %}
