name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: estalatree_test
          POSTGRES_USER: estalatree
          POSTGRES_PASSWORD: estalatree
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DJANGO_SECRET_KEY: ci-secret-key-not-real
      DATABASE_URL: postgres://estalatree:estalatree@localhost:5432/estalatree_test
      REDIS_URL: redis://localhost:6379/0
      CELERY_BROKER_URL: redis://localhost:6379/0
      DJANGO_SETTINGS_MODULE: config.settings.dev

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "0.11.7"

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Lint (ruff + black + isort)
        run: |
          uv run ruff check .
          uv run black --check .
          uv run isort --check-only .

      - name: Check for missing migrations
        run: uv run python manage.py makemigrations --check --dry-run

      - name: Run tests
        run: uv run pytest

      - name: Dependency audit
        run: uv run pip-audit
